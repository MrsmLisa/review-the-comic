{% extends 'base.html' %} 
{%load crispy_forms_tags %} 
{% block content %}
<section>
  <div class="container">
    <div class="row justify-content-center m-3">
      <div class="col-12 col-md-8">
        <h1>Delete Comment</h1>
        <p>Are you sure you want to delete this comment?</p>
        <form method="post" action="{% url 'delete_comment' slug=review.slug comment_id=comment.id %}">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Delete Comment</button>
          <a href="{% url 'review_detail' slug=review.slug %}" class="btn btn-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
