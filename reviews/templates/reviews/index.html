{% extends 'base.html' %}

{% block content %}
    <p>Reviews</p>
    {% for review in reviews %}
        <div>
            <h2>{{ review.title }}</h2>
            <p>By {{ review.book_author }}</p>
            <p>{{ review.content }}</p>
            <p>Rating: {{ review.rating }}</p>
        </div>
    {% endfor %}
{% endblock %}
