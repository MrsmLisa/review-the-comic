{% extends 'base.html' %}

{% block content %}
    <!-- Bootstrap Card -->
     <div class="row justify-content-center">
    {% for review in reviews %}
    <div class="card mb-3 col-10 col-md-5" style="max-width: 400px;">
  <div class="row g-0">
    <div class="col-md-4">
      <img src="..." class="img-fluid rounded-start" alt="...">
    </div>
    <div class="col-md-8">
      <div class="card-body">
        <h5 class="card-title">{{ review.title }}</h5>
        <p class="card-text">By {{ review.book_author }}</p>
        <p class="card-text">{{review.excerpt}}.</p>
        <p class="card-text"><small class="text-body-secondary">{{review.date}}</small></p>
      </div>
    </div>
  </div>
</div>
    {% endfor %}
</div>
{% endblock %}
