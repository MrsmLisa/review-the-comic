{% extends 'base.html' %} 
{%load crispy_forms_tags %} 
{% block content %}
<section>
  <div class="container">
    <div class="row justify-content-center m-3">
      <div class="col-12 col-md-8">
        <h1>Edit Comment</h1>
        <form method="post" action="{% url 'edit_comment' slug=review.slug comment_id=comment.id %}">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn">Update Comment</button>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
