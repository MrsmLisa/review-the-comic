{% extends 'base2.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block content %}

<section>
  <div class="container">
      {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }}" role="alert">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
    <h2>Create Review</h2>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-primary">Create Review</button>
    </form>
  </div>

{% endblock %}
