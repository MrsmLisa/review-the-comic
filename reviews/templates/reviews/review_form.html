{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block content %}

<section>
  <div class="container">
    <div class="row justify-content-center m-3">
      <div class="col-12 col-md-8">
     
    <h1 class="h2">Create Review</h1>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-primary">{% if editing %}Update Review{% else %}Create Review{% endif %}</button>
    </form>
      </div>
    </div>
  </div>
</section>

{% endblock %}
