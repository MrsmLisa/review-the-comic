{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block content %}

<section>
  <div class="container">
     
    <h2>Create Review</h2>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="btn btn-primary">{% if editing %}Update Review{% else %}Create Review{% endif %}</button>
    </form>
  </div>

{% endblock %}
